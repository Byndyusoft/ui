microservice:
    kind: "Deployment"

    replicas:
        default: 1
        preprod: 1
        prod: 1

    resourcesLimitsMemory:
        default: 128Mi
    resourcesRequestsMemory:
        default: 64Mi
    resourcesRequestsCPU:
        default: 10m

    imagePullSecrets:
        - name: artifacts-registry

    servicePorts:
        - port: 8080
          targetPort: 8080
          protocol: TCP
          name: application

    containerPorts:
        - containerPort: 8080
          name: http
          protocol: TCP

    livenessProbe:
        enabled: true
        path: /_readiness
        port: 8080

    ingress:
        enabled: true
        ingressClassName: nginx
        labels: {}
        annotations:
            default:
                cert-manager.io/cluster-issuer: letsencrypt
            prod:
                cert-manager.io/cluster-issuer: letsencrypt
        hosts:
            - host:
                  test: storybook-test.stage.byndyusoft.com
                  default: storybook-preprod.stage.byndyusoft.com
                  prod: storybook.prod.byndyusoft.com
              path: /
              pathType: ImplementationSpecific
              servicePorts: 8080
        tls:
            - secretName: ui-components-tls
              hosts:
                  default: storybook.stage.byndyusoft.com
                  prod: storybook.prod.byndyusoft.com

    nodeSelector:
        node-role.kubernetes.io/frontend: ""

makefile:
    env:
        docker_file: "Dockerfile"